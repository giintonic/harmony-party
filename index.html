<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Harmony Party Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=K2D:wght@400;700;800&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'K2D', sans-serif; background: #000; color: #fff; }
        .card { background: #111; border: 1px solid #333; }
        .input-box { background: #1a1a1a; border: 1px solid #444; color: #fff; }
        select option { background: #111; color: #fff; }
    </style>
</head>
<body class="p-4">
    <div class="max-w-md mx-auto space-y-6">
        <h1 class="text-3xl font-black text-blue-500 text-center">🍻 Harmony Party</h1>
        
        <div class="card p-4 rounded-2xl text-center">
            <p class="text-sm text-gray-400">รหัสบิล: <span id="billCode" class="text-white font-bold text-lg"></span></p>
        </div>
        
        <div class="card p-6 rounded-3xl space-y-3">
            <input type="text" id="name" placeholder="ชื่อของคุณ" class="w-full p-4 rounded-xl input-box text-xl">
            
            <div class="grid grid-cols-2 gap-2">
                <button onclick="setStatus('ดื่ม')" id="btnDrink" class="p-4 rounded-xl border border-blue-500 bg-blue-900 font-bold">🍻 ดื่มแอลฯ</button>
                <button onclick="setStatus('ไม่ดื่ม')" id="btnNoDrink" class="p-4 rounded-xl border border-gray-500 font-bold">🥤 ไม่ดื่ม</button>
            </div>
            
            <input type="text" id="item" placeholder="รายการ (ถ้าเป็นแอลฯ ให้มีคำว่า เบียร์/เหล้า/ไวน์)" class="w-full p-4 rounded-xl input-box text-xl">
            <input type="number" id="price" placeholder="ราคาที่จ่าย" class="w-full p-4 rounded-xl input-box text-xl">
            
            <select id="bankName" class="w-full p-4 rounded-xl input-box text-xl">
                <option value="พร้อมเพย์">พร้อมเพย์ (เบอร์โทร/เลขบัตร)</option>
                <option value="กสิกรไทย">ธนาคารกสิกรไทย (KBank)</option>
                <option value="ไทยพาณิชย์">ธนาคารไทยพาณิชย์ (SCB)</option>
                <option value="กรุงเทพ">ธนาคารกรุงเทพ (BBL)</option>
                <option value="กรุงไทย">ธนาคารกรุงไทย (KTB)</option>
                <option value="กรุงศรีอยุธยา">ธนาคารกรุงศรีอยุธยา (BAY)</option>
                <option value="ทหารไทยธนชาต">ธนาคารทหารไทยธนชาต (ttb)</option>
                <option value="ออมสิน">ธนาคารออมสิน (GSB)</option>
                <option value="ยูโอบี">ธนาคารยูโอบี (UOB)</option>
                <option value="ธนาคารอื่นๆ">ธนาคารอื่นๆ</option>
            </select>
            
            <input type="text" id="accNo" placeholder="เลขบัญชี / เบอร์พร้อมเพย์" class="w-full p-4 rounded-xl input-box text-xl">
            <button onclick="saveData()" class="w-full bg-blue-600 p-6 rounded-2xl font-black text-xl hover:bg-blue-700 transition">บันทึกข้อมูลของฉัน</button>
        </div>

        <button onclick="calculate()" class="w-full bg-yellow-500 text-black font-black p-4 rounded-xl text-lg hover:bg-yellow-600 transition">คำนวณสรุปบิล</button>
        
        <div id="resultBox" class="card p-6 rounded-2xl hidden space-y-4">
            <h2 class="font-bold text-xl border-b border-gray-700 pb-2 text-blue-400">ผลสรุปหนี้สินรายบุคคล</h2>
            <div id="displayResult" class="space-y-4"></div>
        </div>

        <button onclick="resetData()" class="w-full text-gray-500 text-xs underline mt-4">ล้างข้อมูลบิลทั้งหมดเพื่อเริ่มใหม่</button>
    </div>

    <script>
        // สุ่มเลขบิล 4 หลักเมื่อโหลดหน้าจอ
        document.getElementById('billCode').innerText = Math.floor(1000 + Math.random() * 9000);

        let currentStatus = 'ดื่ม';
        let allData = JSON.parse(localStorage.getItem('partyData')) || [];

        function setStatus(s) {
            currentStatus = s;
            document.getElementById('btnDrink').className = s === 'ดื่ม' ? 'p-4 rounded-xl border border-blue-500 bg-blue-900 font-bold' : 'p-4 rounded-xl border border-gray-500 font-bold';
            document.getElementById('btnNoDrink').className = s === 'ไม่ดื่ม' ? 'p-4 rounded-xl border border-blue-500 bg-blue-900 font-bold' : 'p-4 rounded-xl border border-gray-500 font-bold';
        }

        function saveData() {
            let nameInput = document.getElementById('name').value.trim();
            let itemInput = document.getElementById('item').value.trim();
            let priceInput = parseFloat(document.getElementById('price').value) || 0;
            let bankInput = document.getElementById('bankName').value;
            let accInput = document.getElementById('accNo').value.trim();

            if (!nameInput) {
                alert("กรุณากรอกชื่อของคุณก่อนบันทึกครับ");
                return;
            }

            let entry = { 
                name: nameInput, 
                status: currentStatus, 
                item: itemInput || "ไม่ระบุรายการ", 
                price: priceInput, 
                bank: bankInput, 
                acc: accInput 
            };
            
            allData.push(entry);
            localStorage.setItem('partyData', JSON.stringify(allData));
            alert("บันทึกข้อมูลของ " + nameInput + " เรียบร้อยแล้ว!");
            
            // ล้างข้อมูลแค่ช่องรายการกับราคาเพื่อให้กรอกบิลต่อไปง่ายๆ ไม่ต้องพิมพ์ชื่อใหม่
            document.getElementById('item').value = "";
            document.getElementById('price').value = "";
        }

        function calculate() {
            if (allData.length === 0) {
                alert("ยังไม่มีข้อมูลในบิล กรุณากรอกและบันทึกข้อมูลก่อนครับ");
                return;
            }

            let summary = {};
            // จัดกลุ่มและรวมยอดจ่ายจริงของแต่ละคน ป้องกันการเกิดชื่อซ้ำ
            allData.forEach(i => {
                if (!summary[i.name]) {
                    summary[i.name] = { name: i.name, status: i.status, paid: 0, bank: i.bank, acc: i.acc };
                }
                summary[i.name].paid += i.price;
                // อัปเดตข้อมูลบัญชีล่าสุดของคนนั้นๆ เผื่อกรอกข้ามช่องในรอบแรก
                if (i.acc) {
                    summary[i.name].bank = i.bank;
                    summary[i.name].acc = i.acc;
                }
            });

            // แยกประเภทรายการคำนวณเงิน
            let foodItems = allData.filter(i => !i.item.toLowerCase().match(/เบียร์|เหล้า|แอล|ไวน์|แอก|ค็อกเทล/));
            let alcItems = allData.filter(i => i.item.toLowerCase().match(/เบียร์|เหล้า|แอล|ไวน์|แอก|ค็อกเทล/));
            
            let totalFood = foodItems.reduce((s, i) => s + i.price, 0);
            let totalAlc = alcItems.reduce((s, i) => s + i.price, 0);
            
            let allPeople = Object.keys(summary).length;
            let drinkers = Object.values(summary).filter(i => i.status === 'ดื่ม').length;
            
            let avgFood = allPeople > 0 ? (totalFood / allPeople) : 0;
            let avgAlc = drinkers > 0 ? (totalAlc / drinkers) : 0;

            document.getElementById('resultBox').classList.remove('hidden');
            
            document.getElementById('displayResult').innerHTML = Object.values(summary).map(p => {
                let shouldPay = avgFood + (p.status === 'ดื่ม' ? avgAlc : 0);
                let balance = Math.round(shouldPay - p.paid);
                
                let actionText = "";
                let qrCodeHtml = "";
                let bankInfoHtml = "";

                if (balance > 0) {
                    actionText = `<span class="text-red-400 font-bold text-lg">ต้องโอนเพิ่ม: ${balance} บ.</span>`;
                } else if (balance < 0) {
                    let refundAmount = Math.abs(balance);
                    actionText = `<span class="text-green-400 font-bold text-lg">ได้รับเงินคืน: ${refundAmount} บ.</span>`;
                    
                    if (p.acc) {
                        bankInfoHtml = `<div class="text-sm text-gray-400 mt-1">🏦 ช่องทางรับเงิน: ${p.bank} (${p.acc})</div>`;
                        // เจนเนอเรต QR Code พร้อมเพย์อัตโนมัติผ่าน PromptPay API (เฉพาะคนได้คืนเงิน)
                        let cleanAcc = p.acc.replace(/[^0-9]/g, ''); // กรองเอาเฉพาะตัวเลข
                        if (cleanAcc.length >= 10) { // เบอร์โทรศัพท์ หรือ เลขบัญชี/เลขบัตร
                            qrCodeHtml = `<div class="mt-2 bg-white p-2 inline-block rounded-xl"><img src="https://promptpay.io/${cleanAcc}/${refundAmount}.png" class="w-32 h-32" alt="PromptPay QR"></div>`;
                        }
                    } else {
                        bankInfoHtml = `<div class="text-sm text-amber-400 mt-1">⚠️ ไม่ได้ระบุเลขบัญชีไว้</div>`;
                    }
                } else {
                    actionText = `<span class="text-gray-400 font-bold">ลงตัวพอดี ไม่ต้องโอนหรือรับคืน</span>`;
                }

                return `
                    <div class="p-4 rounded-xl bg-neutral-900 border border-neutral-800 space-y-1">
                        <div class="flex justify-between items-center">
                            <span class="text-xl font-bold text-white">${p.name} <span class="text-xs font-normal text-gray-500">(${p.status})</span></span>
                            <span class="text-xs text-gray-400">จ่ายจริงไป: ${p.paid} บ.</span>
                        </div>
                        <div>${actionText}</div>
                        ${bankInfoHtml}
                        ${qrCodeHtml}
                    </div>
                `;
            }).join('');
        }

        function resetData() {
            if (confirm("คุณแน่ใจใช่ไหมว่าต้องการล้างข้อมูลปาร์ตี้นี้ทั้งหมด?")) {
                localStorage.removeItem('partyData');
                allData = [];
                document.getElementById('resultBox').classList.add('hidden');
                location.reload();
            }
        }
    </script>
</body>
</html>
